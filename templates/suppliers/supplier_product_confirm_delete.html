{% extends 'base.html' %}

{% block title %}Delete Product - Supplier{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-danger text-white">
                    <h5 class="mb-0"><i class="fas fa-exclamation-triangle"></i> Confirm Delete</h5>
                </div>
                <div class="card-body text-center">
                    <i class="fas fa-trash-alt fa-4x text-danger mb-3"></i>
                    <h4>Are you sure?</h4>
                    <p class="text-muted">
                        You are about to delete <strong>"{{ product.name }}"</strong>.
                        This action cannot be undone.
                    </p>
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">
                            <i class="fas fa-trash"></i> Yes, Delete Product
                        </button>
                        <a href="{% url 'suppliers:supplier_my_products' %}" class="btn btn-secondary">
                            Cancel
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
