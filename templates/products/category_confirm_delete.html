{% extends 'base.html' %}

{% block title %}Delete Category{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-danger text-white">
                    <h3 class="mb-0">Confirm Delete</h3>
                </div>
                <div class="card-body text-center">
                    <i class="fas fa-exclamation-triangle text-danger" style="font-size: 64px;"></i>
                    <h4 class="mt-3">Are you sure you want to delete?</h4>
                    <p class="text-danger"><strong>{{ category.name }}</strong></p>
                    <p class="text-muted">This will also remove the category from all products.</p>
                    
                    <div class="d-flex justify-content-center gap-2">
                        <form method="post">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-danger">
                                <i class="fas fa-trash"></i> Yes, Delete
                            </button>
                        </form>
                        <a href="{% url 'products:category_list' %}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Cancel
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
