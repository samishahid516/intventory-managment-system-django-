{% extends 'base.html' %}

{% block title %}Update Task Status{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3 class="mb-0">Update Task Status</h3>
                </div>
                <div class="card-body">
                    <h5>{{ task.title }}</h5>
                    <p class="text-muted">Current Status: 
                        <span class="badge bg-{% if task.status == 'pending' %}warning{% elif task.status == 'in_progress' %}info{% elif task.status == 'completed' %}success{% else %}secondary{% endif %}">
                            {{ task.get_status_display }}
                        </span>
                    </p>
                    <hr>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">New Status</label>
                            <select name="status" class="form-select">
                                {% for key, value in status_choices %}
                                <option value="{{ key }}" {% if task.status == key %}selected{% endif %}>
                                    {{ value }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{% url 'tasks:task_list' %}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">Update Status</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
